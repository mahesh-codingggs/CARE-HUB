spring.application.name=carehub

# ----- Database (MySQL) -----
# The DB is auto-created on first run if it doesn't exist.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ----- JPA / Hibernate -----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ----- Server -----
server.port=8080
server.servlet.session.timeout=30m

# ----- Mail (used by the Supplier Email / Purchase Order automation) -----
# Leave the username/password blank to run the app without email — the
# EmailService catches send failures so the rest of the app keeps working.
# For real delivery via Gmail SMTP, use a Google "app password" here.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=dineshsirvisirvi14@gmail.com
spring.mail.password=hkyoiaepvcmhctly
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ----- File upload (not currently used, headroom for future reports) -----
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
