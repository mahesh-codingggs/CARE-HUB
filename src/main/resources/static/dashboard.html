<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Dashboard — CareHub</title>
<link rel="stylesheet" href="css/style.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <div class="topbar">
        <div>
          <h2>Dashboard</h2>
          <p>Real-time overview of hospital operations</p>
        </div>
      </div>

      <div class="stat-grid" id="statGrid"></div>

      <div class="dash-grid">
        <div class="card" id="lowStockCard">
          <div class="card-header"><h3>⚠ Low Stock Alerts</h3></div>
          <table>
            <thead><tr><th>Medicine</th><th>Batch No</th><th>Available</th><th>Minimum</th><th>Expiry</th></tr></thead>
            <tbody id="lowStockBody"><tr class="empty-row"><td colspan="5">Loading...</td></tr></tbody>
          </table>
        </div>

        <div class="card" id="expiryCard">
          <div class="card-header"><h3>Expiring Soon (30 days)</h3></div>
          <table>
            <thead><tr><th>Medicine</th><th>Batch No</th><th>Available</th><th>Expiry</th></tr></thead>
            <tbody id="expiryBody"><tr class="empty-row"><td colspan="4">Loading...</td></tr></tbody>
          </table>
        </div>
      </div>

      <div class="dash-grid" id="chartGrid">
        <div class="card">
          <div class="card-header"><h3>Monthly Revenue</h3></div>
          <canvas id="revenueChart" height="220"></canvas>
        </div>
        <div class="card">
          <div class="card-header"><h3>Patient Growth</h3></div>
          <canvas id="growthChart" height="220"></canvas>
        </div>
        <div class="card">
          <div class="card-header"><h3>Medicine Usage (30 days)</h3></div>
          <canvas id="usageChart" height="220"></canvas>
        </div>
        <div class="card">
          <div class="card-header"><h3>Stock Distribution</h3></div>
          <canvas id="stockChart" height="220"></canvas>
        </div>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/sidebar.js"></script>
  <script>
    const me = requireAuth();
    renderSidebar("dashboard");
    const role = me ? me.role : null;
    const can = (...roles) => role && roles.includes(role);

    const ALL_STATS = [
      { key: "totalPatients", label: "Total Patients", roles: ["Admin","Doctor","Receptionist","Pharmacist"] },
      { key: "totalDoctors", label: "Total Doctors", roles: ["Admin","Doctor","Receptionist","Pharmacist"] },
      { key: "totalMedicines", label: "Total Medicines", roles: ["Admin","Doctor","Pharmacist"] },
      { key: "availableStock", label: "Available Stock", roles: ["Admin","Pharmacist"] },
      { key: "lowStockCount", label: "Low Stock Alerts", roles: ["Admin","Pharmacist"], badge: "red" },
      { key: "expiringSoonCount", label: "Expiring Medicines", roles: ["Admin","Pharmacist"], badge: "orange" },
      { key: "pendingBills", label: "Pending Bills", roles: ["Admin","Receptionist"] },
      { key: "totalRevenue", label: "Total Revenue", roles: ["Admin"], money: true },
      { key: "aiUrgentAlerts", label: "AI Notifications", roles: ["Admin","Pharmacist"], badge: "red" },
      { key: "totalPrescriptions", label: "Total Prescriptions", roles: ["Admin","Doctor","Pharmacist"] },
      { key: "totalSuppliers", label: "Total Suppliers", roles: ["Admin","Pharmacist"] },
      { key: "totalUsers", label: "Total Users", roles: ["Admin"] },
    ];

    async function loadStats() {
      const grid = document.getElementById("statGrid");
      const visible = ALL_STATS.filter(s => can(...s.roles));
      grid.innerHTML = visible.map(s => `
        <div class="stat-card">
          <div class="num" id="stat_${s.key}">-</div>
          <div class="label">${s.label}</div>
        </div>`).join("");

      try {
        const data = await Api.get("/dashboard/summary");
        visible.forEach(s => {
          const el = document.getElementById(`stat_${s.key}`);
          if (!el) return;
          let val = data[s.key];
          if (s.money && val != null) val = "₹" + Number(val).toLocaleString("en-IN", { maximumFractionDigits: 0 });
          el.textContent = val ?? "-";
          if (s.badge && Number(data[s.key]) > 0) el.classList.add("num-" + s.badge);
        });
      } catch (e) {
        visible.forEach(s => { const el = document.getElementById(`stat_${s.key}`); if (el) el.textContent = "-"; });
      }
    }

    async function loadLowStock() {
      const card = document.getElementById("lowStockCard");
      if (!can("Admin", "Pharmacist")) { card.style.display = "none"; return; }
      const body = document.getElementById("lowStockBody");
      try {
        const rows = await Api.get("/dashboard/low-stock");
        if (!rows.length) {
          body.innerHTML = `<tr class="empty-row"><td colspan="5">All stock levels look healthy.</td></tr>`;
          return;
        }
        body.innerHTML = rows.map(i => `
          <tr>
            <td>${i.medicineName}</td>
            <td>${i.batchNo}</td>
            <td><span class="badge badge-red">${i.availableStock}</span></td>
            <td>${i.minimumStock}</td>
            <td>${i.expiryDate}</td>
          </tr>`).join("");
      } catch (e) {
        body.innerHTML = `<tr class="empty-row"><td colspan="5">Could not load inventory.</td></tr>`;
      }
    }

    async function loadExpiry() {
      const card = document.getElementById("expiryCard");
      if (!can("Admin", "Pharmacist")) { card.style.display = "none"; return; }
      const body = document.getElementById("expiryBody");
      try {
        const rows = await Api.get("/dashboard/expiring?days=30");
        if (!rows.length) {
          body.innerHTML = `<tr class="empty-row"><td colspan="4">Nothing expiring in the next 30 days.</td></tr>`;
          return;
        }
        body.innerHTML = rows.map(i => `
          <tr>
            <td>${i.medicineName}</td>
            <td>${i.batchNo}</td>
            <td>${i.availableStock}</td>
            <td><span class="badge badge-orange">${i.expiryDate}</span></td>
          </tr>`).join("");
      } catch (e) {
        body.innerHTML = `<tr class="empty-row"><td colspan="4">Could not load expiry data.</td></tr>`;
      }
    }

    function makeChart(ctx, type, labels, data, label, color) {
      return new Chart(ctx, {
        type,
        data: { labels, datasets: [{ label, data, backgroundColor: color, borderColor: color, borderWidth: 2, tension: 0.3 }] },
        options: { responsive: true, plugins: { legend: { display: type === "doughnut" } } }
      });
    }

    async function loadCharts() {
      const grid = document.getElementById("chartGrid");
      const showRevenue = can("Admin");
      const showGrowth = can("Admin", "Doctor", "Receptionist");
      const showUsage = can("Admin", "Pharmacist");
      const showStock = can("Admin", "Pharmacist");

      document.getElementById("revenueChart").closest(".card").style.display = showRevenue ? "" : "none";
      document.getElementById("growthChart").closest(".card").style.display = showGrowth ? "" : "none";
      document.getElementById("usageChart").closest(".card").style.display = showUsage ? "" : "none";
      document.getElementById("stockChart").closest(".card").style.display = showStock ? "" : "none";

      if (!showRevenue && !showGrowth && !showUsage && !showStock) { grid.style.display = "none"; return; }

      try {
        const charts = await Api.get("/dashboard/charts");
        if (showRevenue) {
          makeChart(document.getElementById("revenueChart"), "line",
            charts.monthlyRevenue.map(r => r.month), charts.monthlyRevenue.map(r => r.revenue),
            "Revenue", "#0d47a1");
        }
        if (showGrowth) {
          makeChart(document.getElementById("growthChart"), "bar",
            charts.patientGrowth.map(r => r.month), charts.patientGrowth.map(r => r.newPatients),
            "New Patients", "#00acc1");
        }
        if (showUsage) {
          makeChart(document.getElementById("usageChart"), "bar",
            charts.medicineUsage.map(r => r.medicineName), charts.medicineUsage.map(r => r.unitsSold),
            "Units Sold", "#43a047");
        }
        if (showStock) {
          makeChart(document.getElementById("stockChart"), "doughnut",
            charts.stockDistribution.map(r => r.category), charts.stockDistribution.map(r => r.stock),
            "Stock", ["#0d47a1","#00acc1","#43a047","#fb8c00","#e53935","#8e24aa","#6d4c41","#546e7a"]);
        }
      } catch (e) {
        grid.innerHTML = `<div class="card"><p>Could not load chart data.</p></div>`;
      }
    }

    loadStats();
    loadLowStock();
    loadExpiry();
    loadCharts();
  </script>
</body>
</html>
