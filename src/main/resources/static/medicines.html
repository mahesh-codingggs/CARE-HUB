<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Medicines — CareHub</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <div class="topbar">
        <div><h2 id="pageTitle"></h2><p id="pageSubtitle"></p></div>
      </div>
      <div class="card">
        <div class="card-header">
          <input class="search-box" id="searchInput" placeholder="Search medicines..." />
          <button class="btn btn-primary" id="addBtn">+ Add Medicine</button>
        </div>
        <table>
          <thead id="tableHead"></thead>
          <tbody id="tableBody"><tr class="empty-row"><td>Loading...</td></tr></tbody>
        </table>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3 id="modalTitle"></h3>
      <div id="modalForm"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
        <button class="btn btn-primary" id="saveBtn">Save</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/crud.js"></script>
  <script>
    requireAuth();
    renderSidebar("medicines");

    CRUD.init({
      title: "Medicines",
      subtitle: "Master catalog of drugs/items the hospital deals in",
      endpoint: "/medicines",
      idField: "medicineId",
      columns: [
        { key: "medicineName", label: "Medicine Name" },
        { key: "category", label: "Category" },
        { key: "unit", label: "Unit" },
        { key: "description", label: "Description" },
      ],
      searchKeys: ["medicineName", "category", "unit"],
      fields: [
        { name: "medicineName", label: "Medicine Name", type: "text", required: true },
        { name: "category", label: "Category", type: "text" },
        { name: "unit", label: "Unit (e.g. tablet, syrup, injection)", type: "text" },
        { name: "description", label: "Description", type: "textarea" },
      ],
    });
  </script>
</body>
</html>
