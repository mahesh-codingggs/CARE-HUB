<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Prescriptions — CareHub</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <div class="topbar">
        <div><h2 id="pageTitle"></h2><p id="pageSubtitle"></p></div>
      </div>
      <div class="card">
        <div class="card-header">
          <input class="search-box" id="searchInput" placeholder="Search prescriptions..." />
          <button class="btn btn-primary" id="addBtn">+ Add Prescription</button>
        </div>
        <table>
          <thead id="tableHead"></thead>
          <tbody id="tableBody"><tr class="empty-row"><td>Loading...</td></tr></tbody>
        </table>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3 id="modalTitle"></h3>
      <div id="modalForm"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
        <button class="btn btn-primary" id="saveBtn">Save</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/crud.js"></script>
  <script>
    requireAuth();
    renderSidebar("prescriptions");

    CRUD.init({
      title: "Prescriptions",
      subtitle: "Doctor prescriptions issued to patients",
      endpoint: "/prescriptions",
      idField: "prescriptionId",
      columns: [
        { key: "patient", label: "Patient", render: r => r.patient ? r.patient.name : "—" },
        { key: "doctor", label: "Doctor", render: r => r.doctor ? r.doctor.name : "—" },
        { key: "prescriptionDate", label: "Date" },
        { key: "notes", label: "Notes" },
      ],
      searchKeys: ["notes"],
      fields: [
        { name: "patient", label: "Patient", type: "fk", required: true,
          fkEndpoint: "/patients", fkIdField: "patientId", fkLabel: p => p.name },
        { name: "doctor", label: "Doctor", type: "fk", required: true,
          fkEndpoint: "/doctors", fkIdField: "doctorId", fkLabel: d => `Dr. ${d.name}${d.specialization ? " ("+d.specialization+")" : ""}` },
        { name: "prescriptionDate", label: "Prescription Date", type: "date", required: true },
        { name: "notes", label: "Notes", type: "textarea" },
      ],
    });
  </script>
</body>
</html>
