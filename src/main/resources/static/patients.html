<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Patients — CareHub</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <div class="topbar">
        <div><h2 id="pageTitle"></h2><p id="pageSubtitle"></p></div>
      </div>
      <div class="card">
        <div class="card-header">
          <input class="search-box" id="searchInput" placeholder="Search patients..." />
          <button class="btn btn-primary" id="addBtn">+ Add Patient</button>
        </div>
        <table>
          <thead id="tableHead"></thead>
          <tbody id="tableBody"><tr class="empty-row"><td>Loading...</td></tr></tbody>
        </table>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3 id="modalTitle"></h3>
      <div id="modalForm"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
        <button class="btn btn-primary" id="saveBtn">Save</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/crud.js"></script>
  <script>
    requireAuth();
    renderSidebar("patients");

    CRUD.init({
      title: "Patients",
      subtitle: "Patient demographic and contact records",
      endpoint: "/patients",
      idField: "patientId",
      columns: [
        { key: "name", label: "Name" },
        { key: "dateOfBirth", label: "Date of Birth" },
        { key: "gender", label: "Gender" },
        { key: "phone", label: "Phone" },
        { key: "bloodGroup", label: "Blood Group" },
      ],
      searchKeys: ["name", "phone", "bloodGroup"],
      fields: [
        { name: "name", label: "Full Name", type: "text", required: true },
        { name: "dateOfBirth", label: "Date of Birth", type: "date", required: true },
        { name: "gender", label: "Gender", type: "select", required: true,
          options: ["Male", "Female", "Other"] },
        { name: "phone", label: "Phone", type: "text" },
        { name: "address", label: "Address", type: "textarea" },
        { name: "bloodGroup", label: "Blood Group", type: "text" },
      ],
    });
  </script>
</body>
</html>
