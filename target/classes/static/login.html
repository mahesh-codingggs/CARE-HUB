<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CareHub — Sign In</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <h1>Care<span style="color:#00acc1">Hub</span></h1>
      <p class="tag">AI-Based Hospital Inventory &amp; Management System</p>

      <div class="login-error" id="loginError"></div>
      <input type="text" id="username" placeholder="Username" autocomplete="username" />
      <input type="password" id="password" placeholder="Password" autocomplete="current-password" />
      <button id="loginBtn">Sign In</button>

      <p class="login-hint">
        Default admin login: <b>admin</b> / <b>Admin@123</b> (change immediately after first sign-in).<br/>
        Other staff accounts are created by an Admin from the Users page.
      </p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // If already logged in, skip straight to the dashboard.
    if (currentUser()) window.location.href = "dashboard.html";

    document.getElementById("loginBtn").addEventListener("click", login);
    document.getElementById("password").addEventListener("keydown", e => {
      if (e.key === "Enter") login();
    });

    async function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const errBox = document.getElementById("loginError");
      errBox.textContent = "";

      if (!username || !password) {
        errBox.textContent = "Please enter both username and password.";
        return;
      }

      try {
        const user = await Api.post("/auth/login", { username, password });
        saveSession(user);
        window.location.href = "dashboard.html";
      } catch (e) {
        errBox.textContent = e.message || "Login failed.";
      }
    }
  </script>
</body>
</html>
