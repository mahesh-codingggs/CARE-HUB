<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Doctors — CareHub</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <div class="topbar">
        <div><h2 id="pageTitle"></h2><p id="pageSubtitle"></p></div>
      </div>
      <div class="card">
        <div class="card-header">
          <input class="search-box" id="searchInput" placeholder="Search doctors..." />
          <button class="btn btn-primary" id="addBtn">+ Add Doctor</button>
        </div>
        <table>
          <thead id="tableHead"></thead>
          <tbody id="tableBody"><tr class="empty-row"><td>Loading...</td></tr></tbody>
        </table>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3 id="modalTitle"></h3>
      <div id="modalForm"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
        <button class="btn btn-primary" id="saveBtn">Save</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/crud.js"></script>
  <script>
    requireAuth();
    renderSidebar("doctors");

    CRUD.init({
      title: "Doctors",
      subtitle: "Doctor profiles and specializations",
      endpoint: "/doctors",
      idField: "doctorId",
      columns: [
        { key: "name", label: "Name" },
        { key: "specialization", label: "Specialization" },
        { key: "phone", label: "Phone" },
        { key: "email", label: "Email" },
        { key: "user", label: "Login Account", render: r => r.user ? r.user.username : "—" },
      ],
      searchKeys: ["name", "specialization", "email"],
      fields: [
        { name: "name", label: "Full Name", type: "text", required: true },
        { name: "specialization", label: "Specialization", type: "text" },
        { name: "phone", label: "Phone", type: "text" },
        { name: "email", label: "Email", type: "text" },
        { name: "user", label: "Linked Login Account (optional)", type: "fk", required: false,
          fkEndpoint: "/users", fkIdField: "userId", fkLabel: u => `${u.username} (${u.role})` },
      ],
    });
  </script>
</body>
</html>
